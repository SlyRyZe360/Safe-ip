<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — IPTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --border: rgba(255,255,255,0.08);
      --accent: #7c5cfc;
      --accent2: #5cbafc;
      --red: #ff5c8a;
      --text: #dde0f0;
      --muted: #666888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.15;
      animation: float 10s ease-in-out infinite;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -200px; left: -200px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -150px; right: -150px; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px,-20px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(15,15,26,0.85);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
      animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(124,92,252,0.45);
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #fff 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 44px 13px 16px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: rgba(124,92,252,0.6);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.15);
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .eye-btn:hover { color: var(--text); }

    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #5c8cfc);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 8px 24px rgba(124,92,252,0.4);
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,92,252,0.55); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .login-btn .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255,92,138,0.1);
      border: 1px solid rgba(255,92,138,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--red);
      margin-top: 14px;
    }

    .error-msg.show { display: flex; }

    .hint {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="logo">🔐</div>
    <h1>Admin Login</h1>
    <p class="subtitle">Enter your password to access the dashboard</p>

    <form id="loginForm">
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" />
          <button type="button" class="eye-btn" id="toggleEye" title="Show/hide">👁</button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span id="btnText">Login →</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="error-msg" id="errorMsg">
        ⛔ Incorrect password. Try again.
      </div>
    </form>

    <p class="hint">Only authorized admins can access this panel.</p>
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('toggleEye').addEventListener('click', () => {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');

      if (!password) return;

      // Show loading state
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        const data = await res.json();

        if (data.success && data.token) {
          sessionStorage.setItem('admin_token', data.token);
          window.location.href = '/dashboard.html';
        } else {
          errorMsg.classList.add('show');
          btn.disabled = false;
          btnText.style.display = 'block';
          spinner.style.display = 'none';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        errorMsg.textContent = '⚠️ Server error. Please try again.';
        errorMsg.classList.add('show');
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
