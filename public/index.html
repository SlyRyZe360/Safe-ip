<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome — My Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --accent: #7c5cfc;
      --accent2: #5cbafc;
      --text: #e8e8f0;
      --muted: #8888aa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -4s; }
    .blob-3 { width: 300px; height: 300px; background: #fc5cf0; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2s; }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    .glass-card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 60px 70px;
      text-align: center;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(124, 92, 252, 0.5);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(92, 252, 92, 0.1);
      border: 1px solid rgba(92, 252, 92, 0.25);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: #5cfc8a;
      font-weight: 500;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #5cfc8a;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .cta-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #5c8cfc);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(124, 92, 252, 0.4);
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 92, 252, 0.6);
    }

    .visit-id {
      margin-top: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.5s;
    }

    .visit-id.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="glass-card">
    <div class="logo">🌐</div>
    <h1>Welcome!</h1>
    <p>We're glad you stopped by. Explore our content, products, and community — all in one beautiful place.</p>

    <div class="status-badge">
      <div class="dot"></div>
      Live &amp; Operational
    </div>

    <div class="visit-id" id="visitId"></div>
  </div>

  <script>
    // Silently track visitor on page load
    async function trackVisit() {
      try {
        const res = await fetch('/api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            page: window.location.pathname,
            referrer: document.referrer || 'Direct',
          }),
        });
        const data = await res.json();
        if (data.success) {
          const el = document.getElementById('visitId');
          el.textContent = `Session ID: ${data.id}`;
          el.classList.add('show');
        }
      } catch (e) {
        console.warn('Tracking unavailable');
      }
    }

    trackVisit();
  </script>
</body>
</html>
